name: Build and publish images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths:
      - "apps/web/**"
      - "apps/worker/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - "apps/*/Dockerfile"
      - ".github/workflows/images.yml"
  workflow_dispatch:

# Cancel in-progress runs when a new commit lands on the same branch / PR.
concurrency:
  group: images-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        app: [web, worker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Image name: ghcr.io/<owner>/<repo>-{web,worker} (lowercased by the action).
          # Using the repo name as the prefix avoids permission collisions
          # with packages of the same name owned by the user but linked to a
          # different repo.
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-${{ matrix.app }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          # PRs build but don't push — verifies the Dockerfile still works.
          push: ${{ github.event_name != 'pull_request' }}
          # linux/amd64 is what most VPS providers use. Add linux/arm64 to also
          # build for Hetzner CAX / AWS Graviton / Raspberry Pi — note this
          # ~2-3x's build time on x86 runners due to QEMU emulation.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          provenance: false
