apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: korepush-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
    spec:
      serviceAccountName: korepush-worker
      containers:
        - name: worker
          image: korepush-worker:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: korepush-app
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "1000m", memory: "1Gi" }
